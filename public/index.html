<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Trav MAWD Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --bg-card:#12121c;
  --border:#1e1e2e;
  --gold:#d4a843;
  --gold-dim:#a07e30;
  --blue:#5ba4f5;
  --green:#4ade80;
  --red:#f87171;
  --cream:#e8e0d4;
  --cream-muted:#9a9490;
  --cream-dim:#5a5550;
  --r:12px;
  --r-sm:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;font-weight:400;background:var(--bg);color:var(--cream);-webkit-font-smoothing:antialiased}

/* Top Bar */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:rgba(10,10,15,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.topbar-title{
  font-family:'Arial Black',Arial,sans-serif;
  font-weight:900;font-size:18px;
  color:var(--gold);
  letter-spacing:0.02em;
}
.topbar-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px}
.topbar-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Chat Container */
.chat-wrap{
  position:fixed;top:52px;bottom:68px;left:0;right:0;
  overflow-y:auto;overflow-x:hidden;
  padding:16px 16px 20px;
  -webkit-overflow-scrolling:touch;
}
.chat-wrap::-webkit-scrollbar{display:none}

/* Messages */
.msg{margin-bottom:14px;animation:fadeUp 0.25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.msg-user{display:flex;justify-content:flex-end}
.msg-user .msg-bubble{
  background:var(--gold);color:#0a0a0f;
  border-radius:18px 18px 4px 18px;
  max-width:82%;padding:10px 15px;
  font-size:15px;line-height:1.5;font-weight:500;
}

.msg-mawd{display:flex;justify-content:flex-start;gap:8px;align-items:flex-end}
.msg-mawd .msg-avatar{
  width:28px;height:28px;border-radius:50%;
  background:var(--gold);color:#0a0a0f;
  font-size:10px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-family:'Arial Black',Arial,sans-serif;
}
.msg-mawd .msg-bubble{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:18px 18px 18px 4px;
  max-width:82%;padding:10px 15px;
  font-size:15px;line-height:1.5;
  color:var(--cream);
}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--cream-muted);animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.3}40%{opacity:1}}

/* Welcome */
.welcome{text-align:center;padding:40px 20px 30px}
.welcome-title{font-family:'Arial Black',Arial,sans-serif;font-size:24px;color:var(--gold);margin-bottom:6px}
.welcome-sub{font-size:14px;color:var(--cream-muted);line-height:1.5;max-width:300px;margin:0 auto}

/* Quick actions */
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px}
.quick-btn{
  font-family:inherit;font-size:13px;font-weight:500;
  padding:8px 16px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:20px;
  color:var(--cream-muted);cursor:pointer;
  transition:all 0.2s;
}
.quick-btn:hover,.quick-btn:active{border-color:var(--gold);color:var(--gold)}

/* Input Bar */
.input-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));
  background:rgba(10,10,15,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:flex-end;gap:8px;
}
.input-field{
  flex:1;
  font-family:inherit;font-size:15px;font-weight:400;
  color:var(--cream);background:var(--bg-card);
  border:1px solid var(--border);border-radius:22px;
  padding:10px 16px;
  outline:none;resize:none;
  min-height:42px;max-height:120px;
  line-height:1.4;
  transition:border-color 0.2s;
}
.input-field::placeholder{color:var(--cream-dim)}
.input-field:focus{border-color:var(--gold-dim)}

.btn-voice,.btn-send{
  width:42px;height:42px;border-radius:50%;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;
}
.btn-voice{background:var(--bg-card);border:1px solid var(--border);color:var(--cream-muted)}
.btn-voice:hover{border-color:var(--gold);color:var(--gold)}
.btn-voice.recording{background:var(--red);border-color:var(--red);color:#fff;animation:pulse 1s infinite}
.btn-send{background:var(--gold);color:#0a0a0f}
.btn-send:disabled{opacity:0.3;cursor:default}
.btn-send svg,.btn-voice svg{width:18px;height:18px}

/* Voice feedback */
.voice-status{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
  background:var(--red);color:#fff;
  font-size:12px;font-weight:600;
  padding:6px 16px;border-radius:20px;
  display:none;z-index:50;
}
.voice-status.active{display:block;animation:fadeUp 0.2s ease}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-title">Trav MAWD Chat</div>
  <div class="topbar-status"><span class="topbar-dot"></span>Online</div>
</div>

<!-- Chat -->
<div class="chat-wrap" id="chatWrap">
  <div class="welcome" id="welcome">
    <div class="welcome-title">MAWD</div>
    <div class="welcome-sub">Your chief of staff. Ready when you are.</div>
    <div class="quick-actions">
      <button class="quick-btn" onclick="sendQuick('Where am I at with the $8K goal?')">$8K status</button>
      <button class="quick-btn" onclick="sendQuick('What are my open loops?')">Open loops</button>
      <button class="quick-btn" onclick="sendQuick('Production pipeline update')">Production</button>
      <button class="quick-btn" onclick="sendQuick('Fanded Club growth plan')">Fanded Club</button>
    </div>
  </div>
  <div id="messages"></div>
</div>

<!-- Voice Status -->
<div class="voice-status" id="voiceStatus">Listening...</div>

<!-- Input Bar -->
<div class="input-bar">
  <button class="btn-voice" id="btnVoice" onclick="toggleVoice()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
  <textarea class="input-field" id="inputField" placeholder="Talk to MAWD..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
  <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
// State
var chatHistory = [];
var isLoading = false;
var recognition = null;
var isRecording = false;

// DOM refs
var chatWrap = document.getElementById('chatWrap');
var messagesEl = document.getElementById('messages');
var inputField = document.getElementById('inputField');
var btnSend = document.getElementById('btnSend');
var btnVoice = document.getElementById('btnVoice');
var voiceStatus = document.getElementById('voiceStatus');
var welcomeEl = document.getElementById('welcome');

// Input handling
inputField.addEventListener('input', function() {
  btnSend.disabled = !inputField.value.trim() || isLoading;
});

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// Quick actions
function sendQuick(text) {
  inputField.value = text;
  btnSend.disabled = false;
  sendMessage();
}

// Send message
async function sendMessage() {
  var text = inputField.value.trim();
  if (!text || isLoading) return;

  // Hide welcome
  if (welcomeEl) { welcomeEl.style.display = 'none'; }

  // Add user message
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  // Clear input
  inputField.value = '';
  inputField.style.height = 'auto';
  btnSend.disabled = true;
  isLoading = true;

  // Show typing
  var typingEl = addTyping();

  try {
    var res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory.slice(0, -1) })
    });

    var data = await res.json();

    // Remove typing
    if (typingEl && typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);

    if (data.reply) {
      addMessage('mawd', data.reply);
      chatHistory.push({ role: 'assistant', content: data.reply });
    } else {
      addMessage('mawd', 'Something went wrong. Try again.');
    }
  } catch (err) {
    if (typingEl && typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);
    addMessage('mawd', 'Connection error. Check your network.');
  }

  isLoading = false;
  btnSend.disabled = !inputField.value.trim();
}

// Render messages
function addMessage(role, text) {
  var div = document.createElement('div');
  div.className = 'msg msg-' + role;

  if (role === 'mawd') {
    div.innerHTML = '<div class="msg-avatar">M</div><div class="msg-bubble">' + escapeHtml(text) + '</div>';
  } else {
    div.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
  }

  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function addTyping() {
  var div = document.createElement('div');
  div.className = 'msg msg-mawd';
  div.innerHTML = '<div class="msg-avatar">M</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function scrollToBottom() {
  requestAnimationFrame(function() {
    chatWrap.scrollTop = chatWrap.scrollHeight;
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Voice (Web Speech API)
function toggleVoice() {
  if (isRecording) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('Voice not supported in this browser. Try Chrome or Safari.');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  var finalTranscript = '';

  recognition.onresult = function(e) {
    var interim = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript + ' ';
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    inputField.value = finalTranscript + interim;
    autoGrow(inputField);
    btnSend.disabled = !inputField.value.trim();
  };

  recognition.onerror = function(e) {
    console.log('Speech error:', e.error);
    stopVoice();
  };

  recognition.onend = function() {
    if (isRecording) stopVoice();
  };

  recognition.start();
  isRecording = true;
  btnVoice.classList.add('recording');
  voiceStatus.classList.add('active');
}

function stopVoice() {
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
  isRecording = false;
  btnVoice.classList.remove('recording');
  voiceStatus.classList.remove('active');
}

// Focus input on load
setTimeout(function() { inputField.focus(); }, 300);
</script>
</body>
</html>
